name: Daily DuneHa Source Check

on:
workflow_dispatch:
schedule:
# Daily 08:00 KST = 23:00 UTC previous day
- cron: "0 23 * * *"

permissions:
contents: write
pages: write
id-token: write

concurrency:
group: daily-duneha-source-check
cancel-in-progress: false

jobs:
update-data:
runs-on: ubuntu-latest
steps:
- name: Checkout
uses: actions/checkout@v4

```
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Fetch source pages
    run: python scripts/fetch_sources.py

  - name: Update source status without Gemini
    run: python scripts/update_without_gemini.py

  - name: Fetch Korean gaming.tools equipment DB
    run: python scripts/fetch_gaming_tools_ko_db.py

  - name: Update Asia weekly window
    run: python scripts/update_week_window.py

  - name: Test DD parser
    run: python scripts/test_dd_parser.py

  - name: Fetch and validate weekly DD data
    run: python scripts/fetch_dd_weekly.py

  - name: Test dungeon parser
    run: python scripts/test_dungeon_parser.py

  - name: Fetch and validate dungeon data
    run: python scripts/fetch_dungeons.py

  - name: Localize weekly links with Korean DB
    run: python scripts/localize_weekly_with_ko_db.py

  - name: Validate data
    run: python scripts/validate_data.py

  - name: Build Discord announcement draft
    run: python scripts/build_discord_message.py

  - name: Commit updated data when changed
    uses: stefanzweifel/git-auto-commit-action@v5
    with:
      commit_message: "Auto-update Dune Ops data"
      file_pattern: "data/*.json data/*.md data/raw/*.json data/raw/*.html"
```

deploy:
needs: update-data
runs-on: ubuntu-latest
steps:
- name: Checkout updated branch
uses: actions/checkout@v4

```
  - name: Setup Pages
    uses: actions/configure-pages@v5

  - name: Upload Pages artifact
    uses: actions/upload-pages-artifact@v3
    with:
      path: "."

  - name: Deploy to GitHub Pages
    uses: actions/deploy-pages@v4
```
